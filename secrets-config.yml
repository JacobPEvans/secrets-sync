# secrets-config.yml
# Configuration for GitHub Actions secret distribution
#
# Each secret lists the repositories it should be synced to.
# Repository names are without the owner prefix (added automatically).
# Use __SELF__ for the profile repository (resolves to current owner).
#
# When adding a new repo, you must also add it to the fine-grained
# PAT's repository access list. The sync workflow validates PAT
# access at runtime and fails fast if any repo is inaccessible.
# See TROUBLESHOOTING.md for details.

# Anchor: repos that receive the GitHub App key and ID (app-authenticated workflows)
_github_app_repos: &github_app_repos
  - __SELF__
  - ai-assistant-instructions
  - ai-workflows
  - ansible-proxmox
  - ansible-proxmox-apps
  - ansible-splunk
  - claude-code-plugins
  - kubernetes-monitoring
  - mlx-benchmarks
  - nix-ai
  - nix-darwin
  - nix-devenv
  - nix-home
  - python-template
  - secrets-sync
  - terraform-aws-bedrock
  - terraform-aws-static-website
  - terraform-proxmox
  - terraform-runs-on
  - tf-splunk-aws

# Anchor: all repos that receive broadly-distributed secrets
_all_repos: &all_repos
  - .github
  - __SELF__  # Profile repository
  - ai-assistant-instructions
  - ai-workflows
  - ansible-proxmox
  - ansible-proxmox-apps
  - ansible-splunk
  - claude-code-plugins
  - kubernetes-monitoring
  - mlx-benchmarks
  - nix-ai
  - nix-darwin
  - nix-devenv
  - nix-home
  - python-template
  - secrets-sync
  - terraform-aws
  - terraform-aws-bedrock
  - terraform-aws-static-website
  - terraform-proxmox
  - terraform-runs-on
  - tf-splunk-aws
  - tf-static-website

# Anchor: infrastructure repos that use Doppler runtime fetch (Tier 2 secrets)
_infra_repos: &infra_repos
  - ansible-proxmox-apps
  - terraform-runs-on

# Anchor: repos that receive Doppler CI variables (project/config pointers)
_doppler_variable_repos: &doppler_variable_repos
  - nix-ai

# Anchor: repos that consume AI model variables (centralized model config)
_ai_model_repos: &ai_model_repos
  - ai-assistant-instructions
  - ai-workflows
  - nix-ai
  - nix-darwin
  - nix-home

# Anchor: repos for the jacobpevans-claude App (Phase 3 GH Actions migration)
_claude_bot_repos: &claude_bot_repos
  - ai-workflows
  - claude-code-routines

# Anchor: repos that receive RunsOn healthcheck variables
_runson_repos: &runson_repos
  - terraform-runs-on

secrets:
  - name: OPENROUTER_API_KEY
    # API key for OpenRouter (routes Claude API requests via openrouter.ai).
    # Replaces CLAUDE_CODE_OAUTH_TOKEN for CI workflows — see ai-workflows PR #116.
    repositories: *all_repos

  - name: CLAUDE_CODE_OAUTH_TOKEN
    # OAuth token for Claude Code CLI authentication.
    # Restricted to repos that run Claude Code directly (not via OpenRouter).
    # CI workflows should use OPENROUTER_API_KEY instead.
    repositories:
      - .github
      - ai-workflows
      - claude-code-plugins
      - claude-code-routines

  - name: COPILOT_GITHUB_TOKEN
    # Fine-grained PAT for GitHub Copilot AI engine (gh-aw workflows)
    repositories: *all_repos

  - name: GH_CLAUDE_SSH_SIGNING_KEY
    # SSH signing key for Claude Code signed PRs from GitHub Actions
    repositories: *all_repos

  - name: GH_APP_CLAUDE_BOT_CLIENT_SECRET
    # OAuth client secret for jacobpevans-claude App. Phase 3 GH Actions migration
    # — paired with GH_APP_CLAUDE_BOT_CLIENT_ID variable.
    repositories: *claude_bot_repos

  - name: GH_APP_CLAUDE_BOT_ID
    # GitHub App ID for jacobpevans-claude (cloud-routines authoring identity).
    # Reserved for future deploy-routines.yml App-token mints via
    # actions/create-github-app-token@v1. Cloud routine sandboxes consume
    # CLAUDE_ROUTINES_PAT manually pasted into the Anthropic shared env.
    repositories:
      - claude-code-routines

  - name: GH_APP_CLAUDE_BOT_PRIVATE_KEY
    # GitHub App private key (PEM) for jacobpevans-claude. Same scope and
    # rationale as GH_APP_CLAUDE_BOT_ID above.
    repositories:
      - claude-code-routines

  - name: GH_APP_CLAUDE_SSH_SIGNING_KEY
    # SSH signing key paired with the jacobpevans-claude App. Reserved for
    # Phase 3 GH Actions migration (claude-code-action@v1 use_commit_signing).
    # Distribute to repos that invoke the AI-action wrapper.
    repositories:
      - ai-workflows
      - claude-code-routines

  - name: GH_SLACK_WEBHOOK_URL_GITHUB_AUTOMATION
    # Slack Incoming Webhook URL for posting to #github-automation
    repositories: *all_repos

  - name: GH_SLACK_WEBHOOK_URL_GITHUB_CI_FAILURES
    # Slack Incoming Webhook URL for posting to #github-ci-failures
    repositories: *all_repos

  - name: GH_PAT_WORKFLOW_DISPATCH
    # Personal Access Token for triggering workflows across repos
    repositories:
      - .github
      - ai-assistant-instructions
      - claude-code-plugins
      - nix-ai
      - nix-darwin
      - nix-home

  - name: GH_PAC_METRICS_TOKEN
    # GitHub Personal Access Classic token for profile metrics
    repositories:
      - __SELF__  # Profile repository

  - name: GH_APP_PRIVATE_KEY
    source: GH_ACTION_JACOBPEVANS_PRIVATE_KEY
    # GitHub App private key (PEM). Source of truth lives on secrets-sync as
    # GH_ACTION_JACOBPEVANS_PRIVATE_KEY; distributed to consumers as the generic
    # canonical name per actions/create-github-app-token conventions.
    repositories: *github_app_repos

  - name: GH_ACTION_DOPPLER_IAC_CONF_MGMT
    # Read-only Doppler service token for iac-conf-mgmt/prd (infrastructure CI).
    # Infra repos use this token to fetch secrets at runtime via dopplerhq/secrets-fetch-action
    # rather than storing individual infra secrets in GitHub Actions secrets.
    # This is the Tier 2 distribution pattern — see CONFIGURATION.md for details.
    repositories: *infra_repos

  - name: HEALTHCHECK_PING_KEY
    # Healthchecks.io ping key for smoke-runner.yml liveness checks.
    # Stored as a secret (not variable) — possessing it allows spoofing ping results.
    # terraform-runs-on/smoke-runner.yml must reference secrets.HEALTHCHECK_PING_KEY.
    repositories: *runson_repos

  - name: HF_TOKEN
    # Hugging Face Hub token distributed to mlx-benchmarks as HF_TOKEN.
    # Sourced from HF_TOKEN_WRITE_ALL on this repo (write access across all
    # JacobPEvans HF datasets and Spaces). Token is sourced from
    # gh-workflow-tokens/prd in Doppler.
    source: HF_TOKEN_WRITE_ALL
    repositories:
      - mlx-benchmarks

variables:
  - name: AI_MODEL
    # Default AI model for general CI workflows.
    # Replaces .github/config/models.json pattern — see ai-workflows PR #161.
    # Value stored on secrets-sync repo via: gh variable set AI_MODEL --repo <user>/secrets-sync --body "<model-id>"
    repositories: *ai_model_repos

  - name: AI_MODEL_CODE
    # AI model for code-generation workflows.
    # Value stored on secrets-sync repo via: gh variable set AI_MODEL_CODE --repo <user>/secrets-sync --body "<model-id>"
    repositories: *ai_model_repos

  - name: AI_MODEL_FREE
    # Free-tier AI model for low-cost workflows.
    # Value stored on secrets-sync repo via: gh variable set AI_MODEL_FREE --repo <user>/secrets-sync --body "<model-id>"
    repositories: *ai_model_repos

  - name: AI_MODEL_ISSUES
    # AI model for issue-triage workflows.
    # Value stored on secrets-sync repo via: gh variable set AI_MODEL_ISSUES --repo <user>/secrets-sync --body "<model-id>"
    repositories: *ai_model_repos

  - name: AI_MODEL_MAX
    # Highest-capability AI model for complex workflows.
    # Value stored on secrets-sync repo via: gh variable set AI_MODEL_MAX --repo <user>/secrets-sync --body "<model-id>"
    repositories: *ai_model_repos

  - name: AI_MODEL_PLAN
    # AI model for planning workflows.
    # Value stored on secrets-sync repo via: gh variable set AI_MODEL_PLAN --repo <user>/secrets-sync --body "<model-id>"
    repositories: *ai_model_repos

  - name: DOPPLER_CONFIG
    # Doppler config environment for CI automation workflows (prd).
    # Value stored on secrets-sync repo via: gh variable set DOPPLER_CONFIG --repo <user>/secrets-sync --body "prd"
    repositories: *doppler_variable_repos

  - name: DOPPLER_PROJECT
    # Doppler project name for CI automation workflows (ai-ci-automation).
    # Value stored on secrets-sync repo via: gh variable set DOPPLER_PROJECT --repo <user>/secrets-sync --body "ai-ci-automation"
    repositories: *doppler_variable_repos

  - name: GH_ACTION_JACOBPEVANS_BOT_ID
    # Bot ID for JacobPEvans GitHub Actions bot (non-sensitive public identifier).
    repositories: *all_repos

  - name: GH_APP_CLAUDE_BOT_CLIENT_ID
    # Client ID for jacobpevans-claude App (non-sensitive public identifier).
    # Phase 3 GH Actions migration — distribute alongside CLIENT_SECRET above.
    repositories: *claude_bot_repos

  - name: GH_APP_CLAUDE_BOT_NAME
    # Display name 'JacobPEvans-claude' for bot-commit identity.
    repositories: *claude_bot_repos

  - name: GH_APP_CLIENT_ID
    source: GH_ACTION_JACOBPEVANS_CLIENT_ID
    # GitHub App Client ID (non-sensitive public identifier).
    # Per actions/create-github-app-token@v3.1.0+ canonical input — replaces the
    # deprecated `app-id:` input. Source of truth on secrets-sync is named
    # GH_ACTION_JACOBPEVANS_CLIENT_ID; consumers receive the generic canonical name.
    repositories: *github_app_repos

  - name: GH_APP_ID
    source: GH_ACTION_JACOBPEVANS_APP_ID
    # GitHub App numeric ID (non-sensitive public identifier).
    # Used by profile workflows for the bot-commit noreply email format.
    # Most workflows should use GH_APP_CLIENT_ID instead.
    repositories: *github_app_repos

  - name: GH_SLACK_CHANNEL_ID_GITHUB_AUTOMATION
    # Slack channel ID for GitHub automation notifications (non-sensitive identifier).
    repositories: *all_repos

  - name: GH_SLACK_CHANNEL_ID_GITHUB_CI_FAILURES
    # Slack channel ID for GitHub CI failure notifications (non-sensitive identifier).
    repositories: *all_repos

  - name: HEALTHCHECK_SLUG_RUNSON
    # Healthchecks.io check slug for RunsOn smoke test.
    repositories: *runson_repos

  - name: OPENROUTER_BASE_URL
    # Base URL for OpenRouter API (https://openrouter.ai/api/v1).
    # Used as ANTHROPIC_BASE_URL in claude-code-action workflows.
    repositories: *all_repos
