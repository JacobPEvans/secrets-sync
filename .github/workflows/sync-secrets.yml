name: Sync Secrets

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview mode - no secrets will be written'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-secrets.yml'
      - 'secrets-config.yml'

permissions:
  contents: read

jobs:
  load-config:
    name: "Load Configuration"
    runs-on: ubuntu-latest
    outputs:
      secrets: ${{ steps.process-config.outputs.secrets }}
      variables: ${{ steps.process-config.outputs.variables }}
    steps:
      - uses: actions/checkout@v6

      - name: Process configuration and validate repos
        id: process-config
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_SYNC_ACTION }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          PROFILE_REPO="$OWNER"

          # Validate PAT can access the secrets API for every target repo
          ALL_SECRET_REPOS=$(yq eval -o=json '.secrets[].repositories[]' secrets-config.yml \
            | jq -r '.' | sort -u)
          INACCESSIBLE_COUNT=0
          for repo in $ALL_SECRET_REPOS; do
            if [ "$repo" = "__SELF__" ]; then
              full_name="$OWNER/$PROFILE_REPO"
            else
              full_name="$OWNER/$repo"
            fi
            if ! gh api "repos/$full_name/actions/secrets" --silent 2>/dev/null; then
              echo "::warning::PAT cannot access secrets API for: $full_name"
              INACCESSIBLE_COUNT=$((INACCESSIBLE_COUNT + 1))
            fi
          done

          # Validate PAT can access the variables API for variable target repos
          HAS_VARIABLES=$(yq eval '.variables | length' secrets-config.yml)
          if [ "$HAS_VARIABLES" -gt 0 ]; then
            ALL_VAR_REPOS=$(yq eval -o=json '.variables[].repositories[]' secrets-config.yml \
              | jq -r '.' | sort -u)
            for repo in $ALL_VAR_REPOS; do
              if [ "$repo" = "__SELF__" ]; then
                full_name="$OWNER/$PROFILE_REPO"
              else
                full_name="$OWNER/$repo"
              fi
              if ! gh api "repos/$full_name/actions/variables" --silent 2>/dev/null; then
                echo "::warning::PAT cannot access variables API for: $full_name"
                INACCESSIBLE_COUNT=$((INACCESSIBLE_COUNT + 1))
              fi
            done
          fi

          if [ "$INACCESSIBLE_COUNT" -gt 0 ]; then
            echo "::error::$INACCESSIBLE_COUNT repo(s) inaccessible to PAT"
            echo "::error::Add missing repos to the PAT's repository access list"
            exit 1
          fi

          # Convert YAML to JSON, then process with jq
          PROCESSED=$(yq eval -o=json '.secrets' secrets-config.yml | jq -c \
            --arg owner "$OWNER" \
            --arg profile "$PROFILE_REPO" \
            'map({
              name: .name,
              repositories: .repositories,
              repositories_formatted: (
                .repositories
                | map(if . == "__SELF__" then ($owner + "/" + $profile) else ($owner + "/" + .) end)
                | join("\n")
              )
            })')

          echo "secrets=$PROCESSED" >> $GITHUB_OUTPUT

          # Process variables (non-sensitive values synced as repo variables)
          HAS_VARIABLES=$(yq eval '.variables | length' secrets-config.yml)
          if [ "$HAS_VARIABLES" -gt 0 ]; then
            VARS_PROCESSED=$(yq eval -o=json '.variables' secrets-config.yml | jq -c \
              --arg owner "$OWNER" \
              --arg profile "$PROFILE_REPO" \
              'map({
                name: .name,
                value: .value,
                repositories: (
                  .repositories
                  | map(if . == "__SELF__" then ($owner + "/" + $profile) else ($owner + "/" + .) end)
                )
              })')
            echo "variables=$VARS_PROCESSED" >> $GITHUB_OUTPUT
          else
            echo "variables=[]" >> $GITHUB_OUTPUT
          fi

  sync-secrets:
    name: "Sync ${{ matrix.secret.name }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        secret: ${{ fromJSON(needs.load-config.outputs.secrets) }}
      fail-fast: false  # Continue even if one secret fails
    needs: load-config
    steps:
      - uses: jpoehnelt/secrets-sync-action@7840777f242539d96b60477b66aa1c179e7644ea
        with:
          SECRETS: |
            ^${{ matrix.secret.name }}$
          REPOSITORIES: |
            ${{ matrix.secret.repositories_formatted }}
          REPOSITORIES_LIST_REGEX: false
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_SECRETS_SYNC_ACTION }}
        env:
          ${{ matrix.secret.name }}: ${{ secrets[matrix.secret.name] }}

  sync-variables:
    name: "Sync var ${{ matrix.variable.name }}"
    runs-on: ubuntu-latest
    if: ${{ needs.load-config.outputs.variables != '[]' }}
    strategy:
      matrix:
        variable: ${{ fromJSON(needs.load-config.outputs.variables) }}
      fail-fast: false
    needs: load-config
    steps:
      - name: Set variable on target repos
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_SYNC_ACTION }}
          VAR_NAME: ${{ matrix.variable.name }}
          VAR_VALUE: ${{ matrix.variable.value }}
          VAR_REPOS: ${{ toJSON(matrix.variable.repositories) }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          for repo in $(echo "$VAR_REPOS" | jq -r '.[]'); do
            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would set variable $VAR_NAME on $repo"
            else
              gh variable set "$VAR_NAME" --body "$VAR_VALUE" --repo "$repo"
              echo "✅ Set $VAR_NAME on $repo"
            fi
          done
