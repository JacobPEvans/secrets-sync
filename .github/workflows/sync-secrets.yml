name: Sync Secrets

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview mode - no secrets or variables will be written'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-secrets.yml'
      - 'secrets-config.yml'

permissions:
  contents: read

jobs:
  load-config:
    name: "Load Configuration"
    runs-on: ubuntu-latest
    outputs:
      secrets: ${{ steps.process-config.outputs.secrets }}
      variables: ${{ steps.process-config.outputs.variables }}
    steps:
      - uses: actions/checkout@v6

      - name: Process configuration and validate repos
        id: process-config
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_SYNC_ACTION }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          PROFILE_REPO="$OWNER"

          # Validate PAT can access the secrets API for every target repo
          ALL_REPOS=$(yq eval -o=json '.secrets[].repositories[]' secrets-config.yml \
            | jq -r '.' | sort -u)
          INACCESSIBLE_COUNT=0
          for repo in $ALL_REPOS; do
            if [ "$repo" = "__SELF__" ]; then
              full_name="$OWNER/$PROFILE_REPO"
            else
              full_name="$OWNER/$repo"
            fi
            if ! gh api "repos/$full_name/actions/secrets" --silent 2>/dev/null; then
              echo "::warning::PAT cannot access secrets API for: $full_name"
              INACCESSIBLE_COUNT=$((INACCESSIBLE_COUNT + 1))
            fi
          done

          # Validate PAT can access the variables API for every variables target repo
          VAR_REPOS=$(yq eval -o=json '(.variables // [])[].repositories[]' secrets-config.yml \
            | jq -r '.' | sort -u)
          for repo in $VAR_REPOS; do
            if [ "$repo" = "__SELF__" ]; then
              full_name="$OWNER/$PROFILE_REPO"
            else
              full_name="$OWNER/$repo"
            fi
            if ! gh api "repos/$full_name/actions/variables" --silent 2>/dev/null; then
              echo "::warning::PAT cannot access variables API for: $full_name"
              INACCESSIBLE_COUNT=$((INACCESSIBLE_COUNT + 1))
            fi
          done

          if [ "$INACCESSIBLE_COUNT" -gt 0 ]; then
            echo "::error::$INACCESSIBLE_COUNT repo(s) inaccessible to PAT"
            echo "::error::Add missing repos to the PAT's repository access list"
            exit 1
          fi

          # Convert secrets YAML to JSON
          PROCESSED=$(yq eval -o=json '.secrets' secrets-config.yml | jq -c \
            --arg owner "$OWNER" \
            --arg profile "$PROFILE_REPO" \
            'map({
              name: (if (.source != null and .source != "") then .source else .name end),
              dest: .name,
              repositories: .repositories,
              repositories_formatted: (
                .repositories
                | map(if . == "__SELF__" then ($owner + "/" + $profile) else ($owner + "/" + .) end)
                | join("\n")
              )
            })')

          echo "secrets=$PROCESSED" >> $GITHUB_OUTPUT

          # Convert variables YAML to JSON (empty array if section absent)
          VARS_PROCESSED=$(yq eval -o=json '.variables // []' secrets-config.yml | jq -c \
            --arg owner "$OWNER" \
            --arg profile "$PROFILE_REPO" \
            'map({
              name: .name,
              source_name: (if .source != null and .source != "" then .source else .name end),
              repositories: .repositories,
              repositories_formatted: (
                .repositories
                | map(if . == "__SELF__" then ($owner + "/" + $profile) else ($owner + "/" + .) end)
                | join("\n")
              )
            })')

          echo "variables=$VARS_PROCESSED" >> $GITHUB_OUTPUT

  sync-secrets:
    name: "Sync ${{ matrix.secret.dest }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        secret: ${{ fromJSON(needs.load-config.outputs.secrets) }}
      fail-fast: false  # Continue even if one secret fails
    needs: load-config
    steps:
      - uses: jpoehnelt/secrets-sync-action@7840777f242539d96b60477b66aa1c179e7644ea
        with:
          SECRETS: |
            ^${{ matrix.secret.dest }}$
          REPOSITORIES: |
            ${{ matrix.secret.repositories_formatted }}
          REPOSITORIES_LIST_REGEX: false
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_SECRETS_SYNC_ACTION }}
        env:
          ${{ matrix.secret.dest }}: ${{ secrets[matrix.secret.name] }}

  sync-variables:
    name: "Sync Variables"
    runs-on: ubuntu-latest
    needs: load-config
    if: needs.load-config.outputs.variables != '[]'
    steps:
      - name: Sync variables to target repos
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_SYNC_ACTION }}
          VARIABLES_JSON: ${{ needs.load-config.outputs.variables }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SELF_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "$VARIABLES_JSON" | jq -c '.[]' | while read -r entry; do
            VAR_NAME=$(echo "$entry" | jq -r '.name')
            SOURCE_NAME=$(echo "$entry" | jq -r '.source_name')

            # Read value from this repo's variables (using source_name if different from name)
            VAR_VALUE=$(gh variable get "$SOURCE_NAME" --repo "$SELF_REPO" 2>/dev/null) || {
              echo "::error::Source variable $SOURCE_NAME not set on $SELF_REPO — run: gh variable set $SOURCE_NAME --repo $SELF_REPO --body \"example-value\""
              exit 1
            }

            while IFS= read -r target_repo; do
              [ -z "$target_repo" ] && continue
              if [ "$DRY_RUN" = "true" ]; then
                echo "[DRY RUN] Would set $VAR_NAME (from source: $SOURCE_NAME) on $target_repo"
              else
                gh variable set "$VAR_NAME" --repo "$target_repo" --body "$VAR_VALUE"
                echo "Set $VAR_NAME (from source: $SOURCE_NAME) on $target_repo"
              fi
            done <<< "$(echo "$entry" | jq -r '.repositories_formatted')"
          done
